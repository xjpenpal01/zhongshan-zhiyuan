<!DOCTYPE html><html lang="zh-CN"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>添加老师微信复核</title><style>body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",Arial,sans-serif;background:linear-gradient(180deg,#eaf2ff,#f7f9ff);color:#101828}.wrap{max-width:520px;margin:0 auto;padding:22px 16px 40px}.card{background:#fff;border:1px solid #e4ebf7;border-radius:22px;box-shadow:0 12px 40px rgba(16,24,40,.08);padding:22px;text-align:center}h1{color:#0f3f9e;font-size:26px;margin:0 0 8px}.muted{color:#667085}.qr{width:min(330px,88vw);max-width:100%;border-radius:18px;border:1px solid #e4e7ec;margin:16px auto;display:block}.btn{display:block;text-decoration:none;background:#155eef;color:#fff;border-radius:14px;padding:13px 16px;font-weight:900;margin-top:14px}.tip{text-align:left;background:#f7faff;border:1px solid #dce6fb;border-radius:14px;padding:12px;margin-top:16px}</style></head><body><div class="wrap"><div class="card"><h1>添加老师微信复核</h1><p class="muted">长按识别二维码，备注“中山志愿”，老师会根据你提交的模拟志愿表进行复核。</p><img src="wechat-qr.jpg" class="qr" alt="微信二维码"><div class="tip"><b>可领取：</b><br>① 中山市高中出档分数参考<br>② A类6个志愿排序建议<br>③ 指标生填报提醒<br>④ 一次模拟志愿复核</div><a class="btn" href="index.html">返回模拟填报页</a></div></div></body></html>
