<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>中考志愿数据导出</title>
  <style>
    :root{
      --bg:#f5f7fb;
      --card:#ffffff;
      --text:#172033;
      --muted:#667085;
      --line:#e5e7eb;
      --primary:#2563eb;
      --primary-dark:#1d4ed8;
      --danger:#b42318;
      --success:#067647;
      --shadow:0 10px 28px rgba(15,23,42,.08);
      --radius:18px;
    }
    *{box-sizing:border-box;}
    body{
      margin:0;
      font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",Arial,sans-serif;
      background:linear-gradient(180deg,#eef4ff 0%,var(--bg) 180px);
      color:var(--text);
    }
    .wrap{
      max-width:560px;
      margin:0 auto;
      padding:18px 14px 34px;
    }
    .hero{
      padding:10px 4px 14px;
      text-align:left;
    }
    .hero h1{
      margin:0;
      font-size:22px;
      line-height:1.25;
      letter-spacing:-.3px;
    }
    .hero p{
      margin:8px 0 0;
      font-size:13px;
      line-height:1.6;
      color:var(--muted);
    }
    .card{
      background:var(--card);
      border:1px solid rgba(229,231,235,.9);
      border-radius:var(--radius);
      box-shadow:var(--shadow);
      padding:18px;
    }
    .field{margin-top:15px;}
    label{
      display:block;
      margin:0 0 8px;
      font-size:14px;
      font-weight:700;
    }
    input{
      width:100%;
      height:46px;
      border:1px solid #d0d5dd;
      border-radius:12px;
      padding:0 13px;
      font-size:16px;
      outline:none;
      background:#fff;
    }
    input:focus{
      border-color:var(--primary);
      box-shadow:0 0 0 3px rgba(37,99,235,.12);
    }
    .btn{
      width:100%;
      border:0;
      border-radius:13px;
      height:48px;
      padding:0 14px;
      font-size:16px;
      font-weight:800;
      cursor:pointer;
      transition:.18s ease;
      display:flex;
      align-items:center;
      justify-content:center;
      gap:8px;
      text-decoration:none;
    }
    .btn.primary{background:var(--primary);color:#fff;}
    .btn.primary:active{background:var(--primary-dark);transform:translateY(1px);}
    .btn.dark{background:#111827;color:#fff;margin-top:10px;}
    .btn.light{background:#eef2ff;color:#1e40af;margin-top:10px;}
    .btn[disabled]{opacity:.55;cursor:not-allowed;}
    .actions{margin-top:18px;}
    .note{
      margin-top:13px;
      padding:12px;
      border-radius:13px;
      background:#f8fafc;
      border:1px solid #e5e7eb;
      color:var(--muted);
      font-size:13px;
      line-height:1.6;
    }
    .note strong{color:var(--text);}
    .danger{color:var(--danger);font-weight:700;}
    .ok{color:var(--success);font-weight:700;}
    .status{
      display:none;
      margin-top:12px;
      padding:11px 12px;
      border-radius:12px;
      font-size:14px;
      line-height:1.5;
    }
    .status.show{display:block;}
    .status.info{background:#eff6ff;color:#1d4ed8;border:1px solid #bfdbfe;}
    .status.err{background:#fef3f2;color:#b42318;border:1px solid #fecaca;}
    .status.ok{background:#ecfdf3;color:#067647;border:1px solid #bbf7d0;}
    .mini-title{
      font-size:15px;
      font-weight:800;
      margin:18px 0 8px;
    }
    .list{
      margin:0;
      padding-left:18px;
      color:var(--muted);
      font-size:13px;
      line-height:1.7;
    }
    code{
      display:inline-block;
      max-width:100%;
      padding:2px 6px;
      border-radius:6px;
      background:#eef2f7;
      color:#334155;
      font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;
      font-size:12px;
      word-break:break-all;
    }
    .footer{
      margin-top:16px;
      text-align:center;
      color:#94a3b8;
      font-size:12px;
    }
    @media (max-width:420px){
      .wrap{padding:14px 12px 28px;}
      .hero h1{font-size:20px;}
      .card{padding:16px 14px;border-radius:16px;}
      .btn{height:46px;font-size:15px;}
    }
  </style>
</head>
<body>
  <main class="wrap">
    <section class="hero">
      <h1>中考志愿数据导出</h1>
      <p>输入管理密码后，可导出家长提交的模拟志愿数据。请勿把密码发给无关人员。</p>
    </section>

    <section class="card">
      <div class="field">
        <label for="token">管理密码 / ADMIN_TOKEN</label>
        <input id="token" type="password" placeholder="请输入 Cloudflare Worker 中设置的 ADMIN_TOKEN" autocomplete="off" />
      </div>

      <div class="actions">
        <button class="btn primary" id="downloadBtn" type="button">下载 CSV 数据</button>
        <button class="btn dark" id="openBtn" type="button">在新窗口打开导出链接</button>
        <button class="btn light" id="copyBtn" type="button">复制导出链接</button>
      </div>

      <div id="status" class="status"></div>

      <div class="note">
        <strong>说明：</strong>CSV 文件可用 Excel / WPS 打开。如果中文显示异常，可在 WPS 或 Excel 中使用“数据 → 从文本/CSV导入”。
      </div>

      <div class="mini-title">安全提醒</div>
      <ul class="list">
        <li><span class="danger">不要</span>把 ADMIN_TOKEN 写死在网页代码里。</li>
        <li><span class="danger">不要</span>把本页面地址和导出密码发给无关人员。</li>
        <li>如果密码泄露，到 Cloudflare Worker 的 Variables and Secrets 里修改 <code>ADMIN_TOKEN</code>。</li>
      </ul>
    </section>

    <div class="footer">2026中山市中考志愿模拟填报 · 数据导出页</div>
  </main>

  <script>
    const WORKER_BASE = "https://zhongshan-zhiyuan-submit.xjpenpal.workers.dev";

    const tokenEl = document.getElementById("token");
    const statusEl = document.getElementById("status");
    const downloadBtn = document.getElementById("downloadBtn");
    const openBtn = document.getElementById("openBtn");
    const copyBtn = document.getElementById("copyBtn");

    function showStatus(message, type = "info") {
      statusEl.textContent = message;
      statusEl.className = "status show " + type;
    }

    function getToken() {
      const token = tokenEl.value.trim();
      if (!token) {
        showStatus("请先输入管理密码。", "err");
        tokenEl.focus();
        return "";
      }
      return token;
    }

    function buildExportUrl() {
      const token = getToken();
      if (!token) return "";
      return `${WORKER_BASE}/admin/export?token=${encodeURIComponent(token)}`;
    }

    downloadBtn.addEventListener("click", () => {
      const url = buildExportUrl();
      if (!url) return;
      showStatus("正在准备下载，如果没有自动下载，请点击“在新窗口打开导出链接”。", "info");
      window.location.href = url;
    });

    openBtn.addEventListener("click", () => {
      const url = buildExportUrl();
      if (!url) return;
      window.open(url, "_blank", "noopener,noreferrer");
    });

    copyBtn.addEventListener("click", async () => {
      const url = buildExportUrl();
      if (!url) return;
      try {
        await navigator.clipboard.writeText(url);
        showStatus("导出链接已复制。注意：链接内含管理密码，不要发给无关人员。", "ok");
      } catch (err) {
        showStatus("复制失败，可点击“在新窗口打开导出链接”后手动复制地址。", "err");
      }
    });
  </script>
</body>
</html>
