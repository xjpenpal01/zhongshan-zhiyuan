<!DOCTYPE html><html lang="zh-CN"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><title>志愿模拟数据导出</title><style>body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",Arial,sans-serif;background:#f4f7ff;color:#101828}.wrap{max-width:620px;margin:0 auto;padding:28px 16px}.card{background:#fff;border:1px solid #e4ebf7;border-radius:20px;box-shadow:0 10px 32px rgba(16,24,40,.06);padding:22px}h1{font-size:24px;color:#0f3f9e;margin:0 0 8px}.muted{color:#667085;font-size:14px;line-height:1.6}label{font-weight:800;color:#344054;font-size:14px}input{width:100%;box-sizing:border-box;border:1px solid #cfd9ea;border-radius:13px;padding:12px 13px;font-size:16px;margin:8px 0 12px}.btn{border:0;border-radius:13px;padding:12px 16px;background:#155eef;color:#fff;font-weight:900;font-size:15px;cursor:pointer;width:100%}.status{margin-top:12px;font-weight:800;color:#344054}.tip{background:#f7faff;border:1px solid #dce6fb;border-radius:14px;padding:12px;margin-top:14px;font-size:13px;line-height:1.7}</style></head><body><div class="wrap"><div class="card"><h1>志愿模拟数据导出</h1><p class="muted">仅供内部老师导出复核数据使用。请输入 Cloudflare Worker 中配置的 ADMIN_TOKEN。</p><label for="token">ADMIN_TOKEN</label><input id="token" type="password" autocomplete="off" placeholder="请输入导出密码"><button class="btn" id="downloadBtn" type="button">下载 CSV</button><p class="status" id="status"></p><div class="tip">提示：不要把 ADMIN_TOKEN 写入网页源码或发给家长。正式使用时建议在 Cloudflare Worker 中设置为 Secret。</div></div></div><script>const WORKER='';document.getElementById('downloadBtn').addEventListener('click',()=>{const token=document.getElementById('token').value.trim();const status=document.getElementById('status');if(!token){status.textContent='请先输入 ADMIN_TOKEN。';return;}status.textContent='正在打开导出链接……';location.href=WORKER+'/admin/export?token='+encodeURIComponent(token);});</script></body></html>
